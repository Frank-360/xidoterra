<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XidoTerra Soil AI</title>

    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<style>

/* RESET */
* {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
}
/* BODY */
    
   
body {
    font-family: 'Segoe UI', Arial, sans-serif;
    background: #f4f7f5;
    
}

/* HERO */
.hero {
    text-align: center;
    padding: 30px 20px;
    background: linear-gradient(135deg, #2e7d32, #66bb6a);
    color: white;
}

.hero h1 {
    font-size: 28px;
}

.hero p {
    margin-top: 8px;
    font-size: 14px;
    opacity: 0.9;
}

/* FORCE SINGLE COLUMN - BULLETPROOF */
.container {
    max-width: 700px;
    margin: 20px auto;
    padding: 0 15px;
}

/* STACK EVERYTHING */
.container > * {
    display: block;
    width: 100%;
}

/* CARD */
.card {
    display: block;
    width: 100%;
    background: white;
    padding: 20px;
    border-radius: 16px;
    margin-bottom: 20px;
    box-shadow: 0 8px 20px rgba(0,0,0,0.06);
}

.card:hover {
    transform: translateY(-2px);
}

/* FORM */
input, select {
    width: 100%;
    padding: 10px;
    border-radius: 8px;
    border: 1px solid #ddd;
    margin-top: 5px;
    margin-bottom: 12px;
}

/* BUTTON */
button {
    background: #2e7d32;
    color: white;
    padding: 12px;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    width: 100%;
    margin-top: 10px;
    font-weight: bold;
}

button:hover {
    background: #1b5e20;
}

/* MAP */
#map {
    width: 100%;
    height: 350px;
    border-radius: 10px;
    margin-top: 10px;
}

/* RESULT */
.result-card {
    max-width: 700px;
    margin: 20px auto;
}

/* INSIGHT */
.insight {
    background: #e3f2fd;
    padding: 10px;
    border-left: 4px solid #1976d2;
    border-radius: 6px;
    margin-bottom: 10px;
}

/* RECOMMEND */
.recommend {
    background: #f1f8e9;
    padding: 10px;
    border-left: 4px solid #558b2f;
    border-radius: 6px;
    margin-bottom: 10px;
}

/* SUMMARY */
.summary {
    background: #fff3cd;
    padding: 12px;
    border-left: 5px solid #ff9800;
    border-radius: 8px;
    margin-bottom: 15px;
}

/* MOBILE */
@media (max-width: 768px) {
    .hero h1 {
        font-size: 22px;
    }

    #map {
        height: 220px;
    }
}

</style>
</head>

<body>
<div class="hero">
    <h1>🌱 XidoTerra AI</h1>
    <p>Smart soil & fertilizer insights for better farming decisions</p>
</div>
        
<div class="container">

    <!-- FORM CARD -->
    <div class="card">
        <form id="soilForm">

            <label>Crop:</label><br>
            <input type="text" id="crop"><br><br>

            <label>Soil Color:</label><br>
            <input type="text" id="soil_color"><br><br>

            <label>Previous Yield:</label><br>
            <select id="previous_yield">
                <option value="low">Low</option>
                <option value="medium">Medium</option>
                <option value="high">High</option>
            </select><br><br>

            <label>Fertilizer Used:</label><br>
            <select id="fertilizer_used">
                <option value="none">None</option>
                <option value="organic">Organic</option>
                <option value="chemical">Chemical</option>
            </select><br><br>

            <label>Location:</label><br>
            <input type="text" id="location">
            <small>📍 Auto-detected. You can edit if incorrect.</small><br><br>

            <button type="button" id="gpsBtn">📍 Use My Location</button>
            <button type="submit">Analyze Soil</button>

            <input type="hidden" id="latitude">
            <input type="hidden" id="longitude">
            
            <hr style="margin:15px 0;">

            <h4>📍 Farm Location</h4>
            <p id="gpsDisplay"></p>

            <div id="map" style="display:none;"></div>
        </form>
    </div>

   

</div>

<!-- RESULT CARD -->
<div class="card result-card" id="result"></div>


<!-- Leaflet JS -->
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>

let map = null;

// FORMAT
function formatLevel(level) {
    return `<span class="${level}">${level.toUpperCase()}</span>`;
}

// BAR DISPLAY
function getBar(level) {
    if (level === "low") return "🟥 ▓▓░░░░";
    if (level === "medium") return "🟧 ▓▓▓▓░░";
    return "🟩 ▓▓▓▓▓▓";
}

// GPS BUTTON
document.getElementById("gpsBtn").addEventListener("click", function () {

    if (!navigator.geolocation) {
        alert("Geolocation not supported");
        return;
    }

    navigator.geolocation.getCurrentPosition(
        function(position) {

            const lat = position.coords.latitude;
            const lon = position.coords.longitude;

            document.getElementById("latitude").value = lat;
            document.getElementById("longitude").value = lon;

            document.getElementById("gpsDisplay").innerHTML =
                `<b>Latitude:</b> ${lat}<br><b>Longitude:</b> ${lon}`;

            // Reverse Geocoding
            fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lon}`)
            .then(res => res.json())
            .then(data => {
                let state = data.address.state || data.address.county || data.address.region || "Unknown";
                document.getElementById("location").value = state;
                document.getElementById("gpsDisplay").innerHTML += `<br><b>State:</b> ${state}`;
            });

            // SHOW MAP FIRST
            document.getElementById("map").style.display = "block";

            // INIT / UPDATE MAP
            if (!map) {
                map = L.map('map').setView([lat, lon], 13);

                L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                    attribution: '© OpenStreetMap'
                }).addTo(map);
            } else {
                map.setView([lat, lon], 13);
            }

            // ADD MARKER
            L.marker([lat, lon]).addTo(map)
                .bindPopup("📍 Farm Location")
                .openPopup();

            // FIX MAP RENDER
            setTimeout(() => {
                map.invalidateSize();
            }, 300);
        },

        function(error) {
            alert("ERROR: " + error.message);
        },

        {
            enableHighAccuracy: true,
            timeout: 15000,
            maximumAge: 0
        }
    );
});


// ✅ FORM SUBMIT (OUTSIDE GPS)
document.getElementById("soilForm").addEventListener("submit", function(e) {
    e.preventDefault();

    const data = {
        crop: document.getElementById("crop").value,
        soil_color: document.getElementById("soil_color").value,
        previous_yield: document.getElementById("previous_yield").value,
        fertilizer_used: document.getElementById("fertilizer_used").value,
        location: document.getElementById("location").value,
        latitude: document.getElementById("latitude").value,
        longitude: document.getElementById("longitude").value
    };

    fetch("https://xidoterra.onrender.com/analyze", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify(data)
    })
    .then(res => res.json())
    .then(result => {

        let output = `<h3>🌱 Soil Analysis Result</h3>`;

        output += `<div class="summary">
        🌟 <b>Summary:</b> ${result.summary}
        </div>`;

        output += `<div><b>Nitrogen:</b> ${getBar(result.nutrient_status.nitrogen)} ${formatLevel(result.nutrient_status.nitrogen)}</div>`;
        output += `<div><b>Phosphorus:</b> ${getBar(result.nutrient_status.phosphorus)} ${formatLevel(result.nutrient_status.phosphorus)}</div>`;
        output += `<div><b>Potassium:</b> ${getBar(result.nutrient_status.potassium)} ${formatLevel(result.nutrient_status.potassium)}</div>`;

        output += "<hr>";

        output += "<h4>🌍 Location Insights</h4>";
        result.insights.forEach(i => output += `<div class="insight">${i}</div>`);

        output += "<h4>💡 Recommendations</h4>";
        result.recommendations.forEach(r => output += `<div class="recommend">${r}</div>`);

        output += "<h4>🧪 Fertilizer Plan</h4>";
        result.fertilizer_plan.length > 0
            ? result.fertilizer_plan.forEach(f => output += `<div class="recommend">${f}</div>`)
            : output += `<div class="recommend">No adjustment needed</div>`;

        document.getElementById("result").innerHTML = output;
    });
});

</script>
</body>
</html>
